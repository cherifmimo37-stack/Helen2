<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Helen Store</title>
<style>
body{font-family:Arial,sans-serif;background:#f7f7f7;margin:0}
header{background:#111;color:#fff;padding:20px;text-align:center}
.logo{font-size:32px;font-weight:bold}
.hero{padding:30px;text-align:center;background:#fff}
.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:15px;padding:20px}
.card{background:#fff;border-radius:12px;padding:15px;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.card img{width:100%;border-radius:10px}
.price{font-size:20px;font-weight:bold;margin:10px 0}
button{background:#25D366;color:#fff;border:none;padding:10px;border-radius:8px;width:100%}
footer{background:#111;color:#fff;text-align:center;padding:15px}
</style>
</head>
<body>
<header><div class="logo">Helen Store</div><div>متجر إلكتروني جزائري</div></header>
<section class="hero"><h2>أهلاً بكم في Helen Store</h2><p>اطلب منتجاتك عبر واتساب.</p></section>
<section class="products">
<div class="card"><h3>ساعة ذكية</h3><div class="price">4500 دج</div></div>
<div class="card"><h3>سماعات بلوتوث</h3><div class="price">2500 دج</div></div>
<div class="card"><h3>حقيبة أنيقة</h3><div class="price">3900 دج</div></div>
</section>
<footer>© 2026 Helen Store</footer>
</body>
</html>
